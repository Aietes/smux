name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
    inputs:
      ref:
        description: Git ref to verify; defaults to the triggering ref
        required: false
        type: string

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Format check
        run: nix develop --command cargo fmt --check

      - name: Test
        run: nix develop --command cargo test

      - name: Clippy
        run: nix develop --command cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Nix package
        run: nix build .#smux

      - name: Verify crates.io package
        run: nix develop --command cargo package --locked

      - name: Generate zsh completions
        run: nix develop --command cargo run -- completions zsh --dir target/generated/completions

      - name: Generate man pages
        run: nix develop --command cargo run -- man --dir target/generated/man

      - name: Upload generated docs
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: |
            target/generated/completions
            target/generated/man
          if-no-files-found: error
